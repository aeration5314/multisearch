<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>자막 검색</title></head>
<body>
<script>
  const q = new URLSearchParams(window.location.search).get("q");
  if (q) {
    window.open(`https://sub-scene.com/search?query=${encodeURIComponent(q)}`, "_blank");
    window.open(`https://www.opensubtitles.org/ko/search2/moviename-${encodeURIComponent(q)}/sublanguageid-kor`, "_blank");
    window.open(`https://subdl.com/search/${encodeURIComponent(q)}`, "_blank");
    window.open(`https://cineaste.co.kr/bbs/board.php?bo_table=psd_caption&sfl=wr_subject&stx=${encodeURIComponent(q)}&sop=and`, "_blank");
    window.close();
  }
</script>
</body>
</html>
