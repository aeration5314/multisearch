    window.open(`https://torrentz2.nz/search?q=${eq}`, "_blank");
    window.open(`https://bitsearch.to/search?q=${eq}`, "_blank");
    window.open(`https://www.btdig.com/search/?q=${eq}`, "_blank");
    window.open(`https://search.torrends.to/${eq}`, "_blank");
    window.open(`https://1337x.to/srch?search=${eq}/1`, "_blank");
    window.open(`https://torrentgalaxy.one/get-posts/keywords:${eq}`, "_blank");
    location.href = `https://thepiratebay.org/search.php?q=${eq}`;
  }
</script>
</body>
</html>
