<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JAV 검색</title></head>
<body>
<script>
window.onload = function() {
  const q = (new URLSearchParams(window.location.search).get("q") || "").trim();
  if (!q) return;
  const eq = encodeURIComponent(q);
  const sites = {
    "Nyaa":         `https://sukebei.nyaa.si/?f=0&c=0_0&q=${eq}`,
    "BT4G":         `https://bt4gprx.com/search?q=${eq}`,
    "BT4G-U":       `https://bt4gprx.com/search?q=${eq}U`,
    "BT4G-UC":      `https://bt4gprx.com/search?q=${eq}UC`,
    "MagnetLink":   `https://www.magnetlink.net/search/${eq}`,
    "Damag":        `https://damag.net/?q=${eq}`,
    "SubtitleCat":  `https://www.subtitlecat.com/index.php?search=${eq}`,
    "JAVLibrary":   `https://www.javlibrary.com/en/vl_searchbyid.php?keyword=${eq}`,
    "TorrentQuest": `https://torrentquest.com/1/${eq}&s=seeders&o=desc`,
    "ExtraTorrent": `https://extratorrent.st/search/?search=${eq}`,
    "ExtTo":        `https://ext.to/browse/?q=${eq}`,
    "Torrentz2":    `https://torrentz2.nz/search?q=${eq}`,
    "BitSearch":    `https://bitsearch.to/search?q=${eq}`,
    "BTDig":        `https://www.btdig.com/search/?q=${eq}`,
    "Torrends":     `https://search.torrends.to/${eq}`,
    "1337x":        `https://1337x.to/srch?search=${eq}/1`,
    "TorrentGalaxy":`https://torrentgalaxy.one/get-posts/keywords:${eq}`,
    "PirateBay":    `https://thepiratebay.org/search.php?q=${eq}`,
    "Knaben":       `https://knaben.org/search/${eq}`,
    "ExtToAdult":   `https://ext.to/browse/?with_adult=1&q=${eq}`,
    "BTSearch":     `https://www.btsearch.love/en/search?keyword=${eq}`,
    "0mag":         `https://www.0mag.net/search?q=${eq}`,
    "PikPak":       `https://www.google.com/search?q=site:https://mypikpak.com+${eq}`
  };

  let targets = [];
  if (/^\d{7,8}$/.test(q))
    targets = ["Nyaa"];
  else if (/^[A-Za-z]{0,5}VR[A-Za-z]{0,5}-\d{3,6}$/i.test(q))
    targets = ["Nyaa","MagnetLink","Damag","ExtTo","BitSearch","BTDig","Knaben","BTSearch","PikPak"];
  else if (/^(?![A-Za-z]{0,5}VR)[A-Za-z]{2,6}-\d{3,6}-$/i.test(q))
    targets = ["BT4G-U","BT4G-UC"];
  else if (/^[A-Za-z]{2,6}-\d{3,6}$/.test(q))
    targets = ["Nyaa","BT4G"];
  else
    targets = ["BTDig","1337x","TorrentGalaxy","PirateBay","0mag"];

  const last = targets[targets.length - 1];
  targets.slice(0, -1).forEach(name => { if (sites[name]) window.open(sites[name], "_blank"); });
  if (sites[last]) location.href = sites[last];
};
</script>
</body>
</html>
